# ============================================================================
# Embedded Systems CI/CD Pipeline - Release Workflow
# ============================================================================
#
# This workflow demonstrates a strict, gated release process for embedded
# systems firmware. It enforces quality gates and automates the release
# process to ensure only validated firmware reaches production.
#
# Pipeline Stages:
# 1. QA-Test: Validates firmware functionality (Quality Gate)
# 2. Build-and-Release: Creates release artifacts and publishes to GitHub
#
# Key Concepts:
# - Automated testing prevents human error
# - Job dependencies ensure sequential execution
# - Failed tests block releases (fail-fast approach)
# - Automated versioning using run numbers
# - Artifact generation for deployment
#
# ============================================================================

name: Firmware Release Pipeline

# Trigger: Automatically run on every push to main branch
on:
  push:
    branches:
      - main

# Define pipeline jobs
jobs:
  
  # ============================================================================
  # JOB 1: QA-Test (Quality Gate)
  # ============================================================================
  # This job validates the firmware before allowing any release to proceed.
  # If this job fails, the entire pipeline stops - no release is created.
  
  QA-Test:
    name: 🔍 Quality Assurance Testing
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js environment
      - name: ⚙️  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # Step 3: Run the QA test script
      # This is the critical quality gate - if it fails (exit code 1),
      # the pipeline stops here and no release is created
      - name: 🧪 Run Firmware Validation Tests
        run: npm test
      
      # Step 4: Report success
      - name: ✅ QA Gate Passed
        run: echo "Quality assurance checks completed successfully. Pipeline approved for release."
  
  
  # ============================================================================
  # JOB 2: Build-and-Release (Conditional on QA Success)
  # ============================================================================
  # This job only runs if QA-Test succeeds. It packages the firmware and
  # creates an official GitHub Release with the artifact.
  
  Build-and-Release:
    name: 📦 Build and Release Firmware
    runs-on: ubuntu-latest
    
    # CRITICAL: This job depends on QA-Test passing
    # If QA-Test fails, this job never runs
    needs: QA-Test
    
    # Required permissions for creating releases
    permissions:
      contents: write
    
    steps:
      # Step 1: Checkout the repository code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      # Step 2: Create release artifact (zip the firmware)
      # In a real embedded system, this might be a compiled binary,
      # hex file, or other firmware format
      - name: 🔨 Build Release Artifact
        run: |
          echo "Building firmware release package..."
          zip -r firmware_release.zip src/firmware.js
          echo "✅ Artifact created: firmware_release.zip"
      
      # Step 3: Generate dynamic version tag
      # Using GitHub run number ensures unique, incrementing versions
      - name: 🏷️  Generate Release Tag
        id: tag
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated release tag: $TAG"
      
      # Step 4: Create GitHub Release and upload artifact
      # This makes the firmware available for download and deployment
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Firmware Release ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🎉 Embedded Firmware Release
            
            **Release Version:** ${{ steps.tag.outputs.tag }}
            **Build Number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            ### ✅ Quality Assurance
            This release has passed all automated QA tests and is approved for deployment.
            
            ### 📦 Artifacts
            - `firmware_release.zip` - Production-ready firmware package
            
            ### 🔧 Deployment Instructions
            1. Download the firmware_release.zip artifact
            2. Extract the firmware.js file
            3. Deploy to target embedded system
            4. Verify boot sequence completes successfully
            
            ---
            *This release was automatically generated by the CI/CD pipeline.*
          files: |
            firmware_release.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 5: Report success
      - name: ✅ Release Complete
        run: |
          echo "=========================================="
          echo "🎉 RELEASE SUCCESSFUL"
          echo "=========================================="
          echo "Version: ${{ steps.tag.outputs.tag }}"
          echo "Artifact: firmware_release.zip"
          echo "Status: Published to GitHub Releases"
          echo "=========================================="
